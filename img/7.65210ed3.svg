io.on(&apos;connection&apos;, (socket) =&gt; {
    console.log(`Cliente conectado: ${socket.id}`);

    socket.on(&apos;dibujar&apos;, (datos) =&gt; {
        socket.broadcast.emit(&apos;dibujar&apos;, datos);
    });

